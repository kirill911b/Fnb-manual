<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#8B6914;--gold-bg:#FBF5E6;--gold-border:#D4A843;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#0C447C;--blue-bg:#E6F1FB;
  --teal:#085041;--teal-bg:#E1F5EE;
  --amber:#633806;--amber-bg:#FAEEDA;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --coral:#712B13;--coral-bg:#FAECE7;
  --green:#27500A;--green-bg:#EAF3DE;
  --pink:#72243E;--pink-bg:#FBEAF0;
  --gray:#444441;--gray-bg:#F1EFE8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0ddd8;--border2:#ccc;
  --bg:#f8f7f4;--card:#fff;
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* TOP BAR */
.topbar{background:var(--gold-bg);border-bottom:1px solid var(--gold-border);padding:env(safe-area-inset-top,16px) 16px 0;flex-shrink:0}
.topbar-inner{padding-bottom:12px}
.hotel-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.hotel-name{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.search-wrap{position:relative;margin-top:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:.4;pointer-events:none}
#search{width:100%;height:40px;padding:0 12px 0 38px;font-size:15px;border-radius:10px;border:1px solid var(--border2);background:#fff;color:var(--text);outline:none}
#search:focus{border-color:var(--gold)}

/* PROGRESS */
.progress-bar-wrap{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:12px;color:var(--text2)}
.prog-val{font-size:12px;font-weight:600;color:var(--teal)}
.prog-track{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.prog-fill{height:5px;background:var(--teal);border-radius:3px;transition:width .35s ease}

/* TABS */
.tabs-wrap{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;overflow:hidden}
.tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;margin-right:6px;user-select:none}
.tab:last-child{margin-right:0}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:12px;padding:14px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.card-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-ico svg{width:20px;height:20px}
.card-meta{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.card-sub{font-size:12px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.card-prog{font-size:12px;color:var(--text3);font-weight:500}
.chevron{width:20px;height:20px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}

.card-body{display:none;border-top:1px solid var(--border);padding:4px 14px 14px}
.card.open .card-body{display:block}

/* STEPS */
.slabel{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 6px}
.step{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-user-select:none}
.step:last-of-type{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .15s}
.step-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:8px;transition:all .2s}
.step-text{font-size:14px;line-height:1.55;color:var(--text);flex:1}
.step.done .step-text{color:var(--text3);text-decoration:line-through}
.step.done .step-num{background:#EAF3DE!important;color:#27500A!important}
.step.done .step-dot{background:var(--teal);border-color:var(--teal)}

/* TIMING GRID */
.timing-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0 4px}
.timing-card{background:var(--bg);border-radius:var(--radius-xs);padding:12px;text-align:center}
.timing-num{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.timing-unit{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.timing-label{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}

/* RESET BTN */
.reset-btn{width:100%;margin-top:12px;padding:10px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.reset-btn:active{background:var(--bg)}
.reset-btn svg{width:15px;height:15px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:40px;height:40px;opacity:.3;margin:0 auto 12px;display:block}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:14px}

/* WARN */
.step-warn .step-num{background:#FCEBEB!important;color:#A32D2D!important}
</style>
</head>

let done={}, openCards={}, activeTab='all', searchQ='';

function ck(cardId,idx){return cardId+'__'+idx}
function stepCount(c){return (c.steps||[]).filter(s=>s.t==='step').length}
function doneCount(c){return (c.steps||[]).filter((s,i)=>s.t==='step'&&done[ck(c.id,i)]).length}

function updateProgress(){
  const ck_cards = DATA.filter(c=>c.ck);
  const total = ck_cards.reduce((a,c)=>a+stepCount(c),0);
  const d = ck_cards.reduce((a,c)=>a+doneCount(c),0);
  document.getElementById('prog-txt').textContent=d+' / '+total+' done';
  document.getElementById('prog-fill').style.width=(total?Math.round(d/total*100):0)+'%';
}

function render(){
  const q=searchQ.toLowerCase();
  const filtered=DATA.filter(c=>{
    if(activeTab!=='all'&&c.cat!==activeTab)return false;
    if(!q)return true;
    return c.title.toLowerCase().includes(q)||c.sub.toLowerCase().includes(q)||(c.steps||[]).some(s=>s.text&&s.text.toLowerCase().includes(q));
  });
  const el=document.getElementById('cards');
  if(!filtered.length){
    el.innerHTML=`<div class="empty">${ico.search}<div class="empty-title">No results</div><div class="empty-sub">Try a different search term</div></div>`;
    return;
  }
  el.innerHTML=filtered.map(c=>{
    const open=openCards[c.id]||false;
    const d=doneCount(c),total=stepCount(c);
    const progStr=c.ck?`<span class="card-prog">${d}/${total}</span>`:'';
    let body='';
    (c.steps||[]).forEach((s,i)=>{
      if(s.t==='label'){body+=`<div class="slabel">${s.text}</div>`;return;}
      if(s.t==='timing'){
        body+=`<div class="timing-grid">${TIMINGS_DATA.map(t=>`<div class="timing-card"><div class="timing-num">${t.num}</div><div class="timing-unit">${t.unit}</div><div class="timing-label">${t.label}</div></div>`).join('')}</div>`;
        return;
      }
      if(s.t==='step'){
        const isDone=done[ck(c.id,i)];
        const nb=s.warn?'#FCEBEB':(isDone?'#EAF3DE':'#f0efe9');
        const nc=s.warn?'#A32D2D':(isDone?'#27500A':'#888');
        body+=`<div class="step${isDone?' done':''}${s.warn?' step-warn':''}" data-card="${c.id}" data-idx="${i}"><div class="step-num" style="background:${nb};color:${nc}">${s.n}</div><div class="step-text">${s.text}</div></div>`;
        return;
      }
      if(s.t==='dot'){
        body+=`<div class="step" style="cursor:default"><div class="step-dot"></div><div class="step-text">${s.text}</div></div>`;
      }
    });
    if(c.ck) body+=`<button class="reset-btn" data-reset="${c.id}">${ico.refresh} Reset checklist</button>`;
    return `<div class="card${open?' open':''}" id="c-${c.id}">
      <div class="card-head" data-toggle="${c.id}">
        <div class="card-ico" style="background:${c.icoB};color:${c.icoC}">${ico[c.icon]||''}</div>
        <div class="card-meta"><div class="card-title">${c.title}</div><div class="card-sub">${c.sub}</div></div>
        <div class="card-right">${progStr}${ico.chevron}</div>
      </div>
      <div class="card-body">${body}</div>
    </div>`;
  }).join('');
}

document.getElementById('cards').addEventListener('click',e=>{
  const tog=e.target.closest('[data-toggle]');
  if(tog){const id=tog.dataset.toggle;openCards[id]=!openCards[id];render();updateProgress();return;}
  const step=e.target.closest('.step[data-card]');
  if(step&&step.style.cursor!=='default'){const k=ck(step.dataset.card,step.dataset.idx);done[k]=!done[k];render();updateProgress();return;}
  const rst=e.target.closest('[data-reset]');
  if(rst){const c=DATA.find(x=>x.id===rst.dataset.reset);if(c)(c.steps||[]).forEach((_,i)=>{delete done[ck(c.id,i)];});render();updateProgress();}
});

document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  activeTab=t.dataset.cat;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  render();updateProgress();
});

let searchTimer;
document.getElementById('search').addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchQ=this.value.trim();render();updateProgress();},150);
});

render();
updateProgress();
</script>
